<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="kb — CLI Browser">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2233"/>
      <stop offset="1" stop-color="#0a0c12"/>
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)" stroke="#2a3244" stroke-width="2"/>
  <!-- window title bar -->
  <circle cx="132" cy="150" r="15" fill="#ff5f57"/>
  <circle cx="184" cy="150" r="15" fill="#febc2e"/>
  <circle cx="236" cy="150" r="15" fill="#28c840"/>
  <line x1="92" y1="200" x2="420" y2="200" stroke="#2a3244" stroke-width="3"/>
  <!-- terminal prompt: > kb _ -->
  <g font-family="ui-monospace, 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-weight="700" font-size="168">
    <text x="86" y="372" fill="#3ddc97">&gt;</text>
    <text x="196" y="372" fill="#e9eef5">kb</text>
  </g>
  <rect x="388" y="258" width="34" height="120" rx="5" fill="#3ddc97"/>
</svg>
